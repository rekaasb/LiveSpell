<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      margin: 0;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      color: #333;
    }
    .toggle-btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s;
    }
    .toggle-btn.off {
      background: #f44336;
    }
    .toggle-btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
    .status-text {
      font-size: 13px;
      margin-bottom: 15px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 8px;
      text-align: center;
    }
    .info {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 15px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .badge {
      display: inline-block;
      background: #2196F3;
      color: white;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>📝 LiveSpell</h2>
    <button id="toggleExtensionBtn" class="toggle-btn">Отключить</button>
  </div>
  
  <div class="status-text" id="statusMessage">
    ✅ Активен
  </div>
  
  <div class="info">
    🔍 Проверка орфографии в реальном времени<br>
    Просто начните печатать в любом поле
  </div>
  
  <div style="text-align: center; margin-top: 12px;">
    <span class="badge">⚡ Работает автоматически</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
